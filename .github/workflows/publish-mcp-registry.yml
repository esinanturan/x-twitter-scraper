name: Publish MCP Registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    env:
      MCP_PUBLISHER_VERSION: v1.7.8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install mcp-publisher
        run: |
          case "$(uname -m)" in
            x86_64)
              asset="mcp-publisher_linux_amd64.tar.gz"
              checksum="48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c"
              ;;
            aarch64)
              asset="mcp-publisher_linux_arm64.tar.gz"
              checksum="3eaa88ea0590433b538d3971a6ca0863d0345d3ff5937b0d1874b7a8de71a591"
              ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          curl -fsSLO "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${asset}"
          printf "%s  %s\n" "$checksum" "$asset" | sha256sum -c -
          tar xzf "$asset" mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: >
          ./mcp-publisher login http
          --domain xquik.com
          --private-key "${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}"

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
