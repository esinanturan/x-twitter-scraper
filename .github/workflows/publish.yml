name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Verified Package
    if: github.repository == 'Xquik-dev/x-twitter-scraper'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write # Request npm's short-lived OIDC credential.
    steps:
      - name: Check out the release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify release context
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: .github/scripts/verify-release-context.sh

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Inspect package contents
        run: npm pack --dry-run --json

      - name: Check npm registry
        id: registry
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance

  release:
    name: Create GitHub Release
    needs: publish
    if: github.repository == 'Xquik-dev/x-twitter-scraper'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write # Create the verified tag's GitHub release.
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          notice='Xquik is an independent third-party service. Not affiliated with X Corp. "Twitter" and "X" are trademarks of X Corp.'
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes "$notice"
